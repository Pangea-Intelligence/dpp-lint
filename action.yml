name: 'dpp-lint'
description: >-
  Lint EU battery passport payloads against DIN DKE SPEC 99100 and screen
  raw material origins for due-diligence risk (EU 2023/1542, Art. 48-52).
author: 'Pangea Intelligence'
branding:
  icon: 'check-circle'
  color: 'blue'

inputs:
  command:
    description: 'dpp-lint command to run: lint or risk'
    required: false
    default: 'lint'
  files:
    description: 'Payload file(s) or glob(s) to check, space-separated'
    required: true
  origins:
    description: 'Origins file for the risk command (JSON or CSV)'
    required: false
    default: ''
  module:
    description: 'Force a specific module for lint instead of auto-detection'
    required: false
    default: ''
  version:
    description: 'dpp-lint version to run (npm dist-tag or semver)'
    required: false
    default: 'latest'
  args:
    description: 'Extra arguments passed through to dpp-lint (e.g. --json, --quiet)'
    required: false
    default: ''

runs:
  using: 'composite'
  steps:
    - name: Run dpp-lint
      shell: bash
      # Inputs come in via env: as variables, NOT via ${{ }} interpolation
      # into the script text. Otherwise any input (fed from a PR title,
      # branch name etc.) would be a script injection: crafted quotes would
      # break out of the script and run on the runner.
      env:
        INPUT_COMMAND: ${{ inputs.command }}
        INPUT_VERSION: ${{ inputs.version }}
        INPUT_ORIGINS: ${{ inputs.origins }}
        INPUT_MODULE: ${{ inputs.module }}
        INPUT_ARGS: ${{ inputs.args }}
        INPUT_FILES: ${{ inputs.files }}
      run: |
        set -euo pipefail
        CMD=(npx --yes "dpp-lint@$INPUT_VERSION" "$INPUT_COMMAND")
        if [ "$INPUT_COMMAND" = "risk" ] && [ -n "$INPUT_ORIGINS" ]; then
          CMD+=(--origins "$INPUT_ORIGINS")
        fi
        if [ "$INPUT_COMMAND" = "lint" ] && [ -n "$INPUT_MODULE" ]; then
          CMD+=(--module "$INPUT_MODULE")
        fi
        if [ -n "$INPUT_ARGS" ]; then
          # Deliberately unquoted: args is a space-separated list.
          # shellcheck disable=SC2086,SC2206
          CMD+=($INPUT_ARGS)
        fi
        # Deliberately unquoted: globs in INPUT_FILES are expanded by bash here.
        # shellcheck disable=SC2086,SC2206
        CMD+=($INPUT_FILES)
        echo "Running: ${CMD[*]}"
        "${CMD[@]}"
