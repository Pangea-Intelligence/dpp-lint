name: CI

on:
  push:
  pull_request:

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        node-version: [20, 22]
    name: Node ${{ matrix.node-version }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build
        run: npm run build

      - name: Test
        run: npm test

  action-smoke:
    # Dogfooding: the bundled GitHub Action checks the example scenario.
    runs-on: ubuntu-latest
    name: GitHub Action smoke test
    steps:
      - uses: actions/checkout@v4

      - name: lint clean example files via the action
        uses: ./
        with:
          files: examples/brandt-foerdertechnik/incoming-fixed/*.json

      - name: broken example files must fail
        id: broken
        continue-on-error: true
        uses: ./
        with:
          files: examples/brandt-foerdertechnik/incoming/*.json

      - name: assert failure was detected
        if: steps.broken.outcome != 'failure'
        run: |
          echo "expected the action to fail on the broken example files"
          exit 1
